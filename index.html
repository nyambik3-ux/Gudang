<!DOCTYPE html>
<html>
<head>
  <title>Gudang System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      background: #eef2f7;
      padding: 20px;
      max-width: 520px;
      margin: auto;
    }

    h2 {
      margin-top: 25px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 10px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    }

    input, select, button {
      width: 100%;
      padding: 11px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .approve {
      background: #16a34a;
      margin-top: 10px;
    }

    .small {
      font-size: 12px;
      color: #666;
    }

    .pending { color: orange; font-weight: bold; }
    .low { color: red; font-weight: bold; }
    .normal { color: black; }

    .header-box {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 10px;
      color: #555;
    }
  </style>
</head>

<body>

  <div class="header-box">
    <div>🕒 <span id="time"></span></div>
    <div id="mode">User Mode</div>
  </div>

  <h2>📦 Request Barang</h2>

  <div class="card">
    <select id="kode"></select>
    <input type="number" id="qty" placeholder="Qty">
    <input type="text" id="ket" placeholder="Keterangan (opsional)">
    <button onclick="submit()">Kirim Request</button>
  </div>

  <h2>📋 Pending Request</h2>
  <div id="pending"></div>

  <h2>📊 Stok Barang</h2>
  <div id="stok"></div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbweKcvhWPH5oJjVQiexkvrPrZ7mWvbiG4nyjW0EDs_iNriFte-3lzqe06UslfQfjecp/exec";

    const IS_ADMIN = true;

    if (IS_ADMIN) {
      document.getElementById("mode").innerText = "Admin Mode";
    }

    function updateTime() {
      document.getElementById("time").innerText = new Date().toLocaleString();
    }

    async function loadBarang() {
      const res = await fetch(API + "?action=getBarang");
      const data = await res.json();

      let html = "<option value=''>Pilih Barang</option>";
      data.forEach(b => {
        html += `<option value="${b.kode}">${b.nama}</option>`;
      });

      document.getElementById("kode").innerHTML = html;
    }

    async function loadPending() {
      const res = await fetch(API + "?action=getPending");
      const data = await res.json();

      let html = "";

      if (data.length === 0) {
        html = "<div class='card'>Tidak ada request</div>";
      }

      data.forEach(p => {
        html += `
          <div class="card">
            <b>${p.kode}</b> - ${p.qty}<br>
            <div class="small">User: ${p.user}</div>
            <div class="small">Waktu: ${new Date(p.time).toLocaleString()}</div>
            <div class="small">Ket: ${p.ket || "-"}</div>
            <div class="pending">PENDING</div>
            ${IS_ADMIN ? `<button class="approve" onclick="approve(${p.row})">Approve</button>` : ""}
          </div>
        `;
      });

      document.getElementById("pending").innerHTML = html;
    }

    async function loadStok() {
      const res = await fetch(API + "?action=getStok");
      const data = await res.json();

      let html = "";

      data.forEach(b => {
        const warna = b.qty < 10 ? "low" : "normal";

        html += `
          <div class="card">
            <b>${b.nama}</b><br>
            <div class="small">Kode: ${b.kode}</div>
            <div class="${warna}">Qty: ${b.qty}</div>
            <div class="small">Last Update: ${b.last_update}</div>
          </div>
        `;
      });

      document.getElementById("stok").innerHTML = html;
    }

    async function submit() {
      const kode = document.getElementById("kode").value;
      const qty = document.getElementById("qty").value;
      const ket = document.getElementById("ket").value;

      if (!kode || !qty) {
        alert("Isi data dulu");
        return;
      }

      const btn = event.target;
      btn.innerText = "Loading...";

      const res = await fetch(API, {
        method: "POST",
        body: new URLSearchParams({
          action: "request",
          kode,
          qty,
          ket
        })
      });

      const data = await res.json();

      btn.innerText = "Kirim Request";

      if (data.error) {
        alert(data.error);
      } else {
        alert("Request berhasil");
        document.getElementById("qty").value = "";
        document.getElementById("ket").value = "";
        loadPending();
      }
    }

    async function approve(row) {
      const res = await fetch(API, {
        method: "POST",
        body: new URLSearchParams({
          action: "approve",
          row
        })
      });

      const data = await res.json();

      if (data.error) {
        alert(data.error);
      } else {
        loadPending();
      }
    }

    updateTime();
    loadBarang();
    loadPending();
    loadStok();
  </script>

</body>
</html>
